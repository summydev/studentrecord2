<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .btn { padding: 8px 12px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; }
        .btn-danger { background-color: #dc3545; }
    </style>
</head>
<body>
    <h1>Student Directory</h1>
    <a href="{% url 'student_create' %}" class="btn">Add New Student</a>
    
    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{ student.first_name }} {{ student.last_name }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.course }}</td>
            <td>
                <a href="{% url 'student_update' student.pk %}">Edit</a> | 
                <a href="{% url 'student_delete' student.pk %}" style="color: red;">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No students found. Add one above!</td></tr>
        {% endfor %}
    </table>
</body>
</html>
